<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eXtract Clip | Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-10">
    <div class="max-w-2xl mx-auto">
        <a href="index.html" class="text-blue-500 hover:underline mb-8 block">&larr; Back to Dashboard</a>
        <h1 class="text-4xl font-bold mb-6">eXtract Clip</h1>
        
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700">
            <p class="text-slate-400 mb-6">Paste YouTube link below to start clipping!</p>
            
            <!-- YouTube Link Input -->
            <input 
                id="youtubeUrl" 
                type="text" 
                placeholder="Paste YouTube link here..." 
                class="w-full bg-slate-700 text-white p-4 rounded-lg mb-4 border border-slate-600 focus:outline-none focus:border-blue-500"
            />
            
            <button 
                onclick="loadVideo()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition mb-6">
                Load Video
            </button>

            <!-- Video Player -->
            <div id="videoContainer" class="hidden">
                <iframe 
                    id="youtubePlayer"
                    class="w-full rounded-lg"
                    height="315"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
                
                <!-- Clip Controls -->
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-slate-400 text-sm">Start Time (seconds)</label>
                        <input type="number" id="startTime" placeholder="0" 
                            class="w-full bg-slate-700 text-white p-3 rounded-lg mt-1 border border-slate-600"/>
                    </div>
                    <div>
                        <label class="text-slate-400 text-sm">End Time (seconds)</label>
                        <input type="number" id="endTime" placeholder="30" 
                            class="w-full bg-slate-700 text-white p-3 rounded-lg mt-1 border border-slate-600"/>
                    </div>
                </div>

                <button 
                    onclick="extractClip()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg transition mt-4">
                    Extract Clip ✂️
                </button>
            </div>
        </div>
    </div>

    <script>
        function loadVideo() {
            const url = document.getElementById('youtubeUrl').value;
            const videoId = extractVideoId(url);
            
            if (!videoId) {
                alert('Please enter a valid YouTube link!');
                return;
            }
            
            const player = document.getElementById('youtubePlayer');
            player.src = `https://www.youtube.com/embed/${videoId}`;
            
            document.getElementById('videoContainer').classList.remove('hidden');
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function extractClip() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            
            if (!start || !end) {
                alert('Please enter start and end time!');
                return;
            }
            
            alert(`Clip from ${start}s to ${end}s will be extracted! AI processing coming next...`);
        }
    </script>
</body>
</html>
