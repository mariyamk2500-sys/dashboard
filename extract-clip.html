<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eXtract Clip | eX Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .logo { font-family: 'Playfair Display', serif; font-size: 52px; font-style: italic; font-weight: 900; color: #FFD700; letter-spacing: -2px; line-height: 1; -webkit-text-stroke: 1px #FFA500; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .btn-gold { background: #FFD700; color: #000; font-weight: 600; border-radius: 8px; padding: 12px; width: 100%; cursor: pointer; letter-spacing: 2px; font-size: 12px; border: none; transition: all 0.3s; }
        .btn-gold:hover { background: #FFC200; }
        .input-style { background: #151515; border: 1px solid #333; color: white; border-radius: 8px; padding: 10px 14px; width: 100%; font-size: 12px; }
        .input-style:focus { outline: none; border-color: #FFD700; }
        .label { color: #FFD700; font-size: 9px; font-weight: 600; margin-bottom: 5px; display: block; letter-spacing: 2px; }
        .card { background: #0f0f0f; border: 1px solid #222; border-radius: 16px; }

        /* Timeline */
        .timeline-track { position: relative; width: 100%; height: 6px; background: #2a2a2a; border-radius: 3px; margin: 20px 0 10px; }
        .timeline-fill { position: absolute; height: 6px; background: #FFD700; border-radius: 3px; top: 0; }
        .handle { position: absolute; width: 22px; height: 22px; background: #FFD700; border-radius: 50%; top: 50%; transform: translate(-50%, -50%); cursor: grab; border: 2px solid #000; box-shadow: 0 0 8px rgba(255,215,0,0.5); z-index: 10; }
        .handle:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.2); }
        .time-box { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 6px 10px; text-align: center; flex: 1; }
        .time-box-label { color: #FFD700; font-size: 8px; letter-spacing: 2px; display: block; }
        .time-box-value { color: #fff; font-size: 14px; font-weight: 600; }

        /* Responsive */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .main-grid { flex-direction: column !important; }
        }
    </style>
</head>
<body class="text-white">

    <!-- Header -->
    <div style="padding: 12px 24px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="logo">eX</div>
            <div>
                <p style="color:#FFD700; font-size:9px; letter-spacing:6px; font-weight:700;">PRECISION CLIP EXTRACTION</p>
                <p style="color:#555; font-size:8px; letter-spacing:3px;">PROFESSIONAL VIDEO REPURPOSING TOOL</p>
            </div>
        </div>
        <div style="color:#333; font-size:9px; letter-spacing:2px;">eX EDITOR © 2026</div>
    </div>

    <!-- Main Content -->
    <div style="flex:1; padding: 16px 24px; display: flex; gap: 16px; overflow: hidden;" class="main-grid">

        <!-- Left — Input + Video -->
        <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px;">
            
            <!-- URL Input -->
            <div class="card" style="padding: 16px;">
                <label class="label">YOUTUBE LINK</label>
                <div style="display: flex; gap: 8px;">
                    <input id="youtubeUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." class="input-style"/>
                    <button onclick="loadVideo()" style="background:#FFD700; color:#000; font-weight:700; border-radius:8px; padding:10px 16px; cursor:pointer; border:none; white-space:nowrap; font-size:12px; letter-spacing:1px;">▶ LOAD</button>
                </div>
            </div>

            <!-- Video Player -->
            <div class="card" style="flex:1; overflow:hidden; position:relative;">
                <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;">
                    <div style="font-size:48px;">🎬</div>
                    <p style="color:#333; font-size:12px; letter-spacing:2px;">PASTE LINK AND CLICK LOAD</p>
                </div>
                <iframe id="youtubePlayer" class="hidden" style="width:100%; height:100%; border:none;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>

        <!-- Right — Controls -->
        <div style="width: 300px; display: flex; flex-direction: column; gap: 12px;">

            <!-- Clip Range -->
            <div class="card" style="padding: 16px;">
                <label class="label">✂ SELECT CLIP RANGE</label>
                <p style="color:#444; font-size:10px; margin-bottom:8px;">Drag yellow dots to select your clip</p>
                <div class="timeline-track" id="track">
                    <div class="timeline-fill" id="fill"></div>
                    <div class="handle" id="startHandle"></div>
                    <div class="handle" id="endHandle"></div>
                </div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <div class="time-box">
                        <span class="time-box-label">START</span>
                        <span class="time-box-value" id="startDisplay">0:00</span>
                    </div>
                    <div style="align-self:center; color:#333; font-size:16px;">→</div>
                    <div class="time-box">
                        <span class="time-box-label">END</span>
                        <span class="time-box-value" id="endDisplay">1:00</span>
                    </div>
                    <div class="time-box">
                        <span class="time-box-label">CLIP</span>
                        <span class="time-box-value" id="durationDisplay">1:00</span>
                    </div>
                </div>
            </div>

            <!-- Options -->
            <div class="card" style="padding: 16px; flex:1;">
                <label class="label">CLIP SETTINGS</label>
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:8px;">
                    <div>
                        <label class="label">CLIP TITLE</label>
                        <input type="text" id="clipTitle" placeholder="My Clip" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">SPEED</label>
                        <select id="clipSpeed" class="input-style">
                            <option value="1">Normal (1x)</option>
                            <option value="1.25">Fast (1.25x)</option>
                            <option value="1.5">Faster (1.5x)</option>
                            <option value="0.75">Slow (0.75x)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">FORMAT</label>
                        <select id="clipFormat" class="input-style">
                            <option>YouTube (16:9)</option>
                            <option>Reels/TikTok (9:16)</option>
                            <option>Instagram (1:1)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">COLOR FILTER</label>
                        <select id="clipColor" class="input-style">
                            <option>None</option>
                            <option>Vibrant</option>
                            <option>Cinematic</option>
                            <option>Warm</option>
                            <option>Cool</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Extract Button -->
            <button onclick="extractClip()" class="btn-gold">✂ EXTRACT CLIP</button>

        </div>
    </div>

    <script>
        let videoDuration = 300;
        let startTime = 0;
        let endTime = 60;

        function loadVideo() {
            const url = document.getElementById('youtubeUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) { alert('Please enter a valid YouTube link!'); return; }
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${videoId}?rel=0`;
            document.getElementById('youtubePlayer').classList.remove('hidden');
            document.getElementById('placeholder').style.display = 'none';
            setTimeout(updateSlider, 200);
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function updateSlider() {
            const track = document.getElementById('track');
            const trackW = track.offsetWidth;
            const startX = (startTime / videoDuration) * trackW;
            const endX = (endTime / videoDuration) * trackW;
            document.getElementById('startHandle').style.left = startX + 'px';
            document.getElementById('endHandle').style.left = endX + 'px';
            document.getElementById('fill').style.left = startX + 'px';
            document.getElementById('fill').style.width = (endX - startX) + 'px';
            document.getElementById('startDisplay').textContent = formatTime(startTime);
            document.getElementById('endDisplay').textContent = formatTime(endTime);
            document.getElementById('durationDisplay').textContent = formatTime(endTime - startTime);
        }

        function setupDrag(handleId, type) {
            const handle = document.getElementById(handleId);
            const onMove = (clientX) => {
                const track = document.getElementById('track');
                const rect = track.getBoundingClientRect();
                let x = clientX - rect.left;
                x = Math.max(0, Math.min(x, track.offsetWidth));
                const time = Math.round((x / track.offsetWidth) * videoDuration);
                if (type === 'start' && time < endTime - 5) startTime = time;
                if (type === 'end' && time > startTime + 5) endTime = time;
                updateSlider();
            };
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const move = (e) => onMove(e.clientX);
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move), { once: true });
            });
            handle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const move = (e) => onMove(e.touches[0].clientX);
                document.addEventListener('touchmove', move);
                document.addEventListener('touchend', () => document.removeEventListener('touchmove', move), { once: true });
            });
        }

        setupDrag('startHandle', 'start');
        setupDrag('endHandle', 'end');
        updateSlider();

        function extractClip() {
            const title = document.getElementById('clipTitle').value || 'My Clip';
            const speed = document.getElementById('clipSpeed').value;
            const format = document.getElementById('clipFormat').value;
            const color = document.getElementById('clipColor').value;
            alert(`✅ Clip "${title}" ready!\nFrom ${formatTime(startTime)} to ${formatTime(endTime)}\nDuration: ${formatTime(endTime-startTime)}\nSpeed: ${speed}x | Format: ${format} | Filter: ${color}`);
        }
    </script>

</body>
</html>
