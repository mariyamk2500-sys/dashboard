<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eXtract Clip | eX Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
        .card { background: #111111; border: 1px solid #FFD700; border-radius: 16px; }
        .btn-gold { background: #FFD700; color: #000; font-weight: 700; border-radius: 8px; padding: 14px; width: 100%; transition: all 0.3s; cursor: pointer; }
        .btn-gold:hover { background: #FFC200; transform: scale(1.02); }
        .input-style { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; padding: 14px; width: 100%; }
        .input-style:focus { outline: none; border-color: #FFD700; }
        .label { color: #FFD700; font-size: 11px; font-weight: 700; margin-bottom: 6px; display: block; letter-spacing: 2px; }
    </style>
</head>
<body class="text-white p-6">

    <div class="max-w-2xl mx-auto">

        <!-- Header -->
        <div class="text-center mb-10 mt-8">
            <h1 style="font-size:64px; font-weight:300; color:#FFD700; letter-spacing:12px; line-height:1;">eX</h1>
            <p style="color:#FFD700; font-size:10px; letter-spacing:8px; margin-top:8px; font-weight:400;">PRECISION CLIP EXTRACTION</p>
            <div style="width:40px; height:1px; background:#FFD700; margin:12px auto;"></div>
            <p style="color:#444; font-size:10px; letter-spacing:3px;">PROFESSIONAL VIDEO REPURPOSING TOOL</p>
        </div>

        <!-- Main Card -->
        <div class="card p-8">

            <p class="text-gray-500 text-xs mb-6 text-center tracking-widest">PASTE YOUTUBE LINK TO EXTRACT PROFESSIONAL CLIPS</p>

            <!-- YouTube Input -->
            <div class="mb-4">
                <label class="label">YOUTUBE LINK</label>
                <input
                    id="youtubeUrl"
                    type="text"
                    placeholder="https://www.youtube.com/watch?v=..."
                    class="input-style"
                />
            </div>

            <button onclick="loadVideo()" class="btn-gold mb-6">
                ▶ LOAD VIDEO
            </button>

            <!-- Video Player -->
            <div id="videoContainer" class="hidden">

                <div style="border:1px solid #FFD700; border-radius:12px; overflow:hidden; margin-bottom:20px;">
                    <iframe
                        id="youtubePlayer"
                        class="w-full"
                        height="280"
                        frameborder="0"
                        allowfullscreen>
                    </iframe>
                </div>

                <!-- Time Controls -->
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="label">START TIME (seconds)</label>
                        <input type="number" id="startTime" placeholder="0" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">END TIME (seconds)</label>
                        <input type="number" id="endTime" placeholder="30" class="input-style"/>
                    </div>
                </div>

                <!-- Editing Options -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="label">CLIP TITLE</label>
                        <input type="text" id="clipTitle" placeholder="My Clip" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">SPEED</label>
                        <select id="clipSpeed" class="input-style">
                            <option value="1">Normal (1x)</option>
                            <option value="1.25">Fast (1.25x)</option>
                            <option value="1.5">Faster (1.5x)</option>
                            <option value="0.75">Slow (0.75x)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">FORMAT</label>
                        <select id="clipFormat" class="input-style">
                            <option>YouTube (16:9)</option>
                            <option>Reels/TikTok (9:16)</option>
                            <option>Instagram (1:1)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">COLOR FILTER</label>
                        <select id="clipColor" class="input-style">
                            <option>None</option>
                            <option>Vibrant</option>
                            <option>Cinematic</option>
                            <option>Warm</option>
                            <option>Cool</option>
                        </select>
                    </div>
                </div>

                <button onclick="extractClip()" class="btn-gold">
                    ✂ EXTRACT CLIP
                </button>

            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-700 text-xs mt-6 tracking-widest">eX EDITOR © 2026 | SECURE VIDEO TRANSFORMATION</p>

    </div>

    <script>
        function loadVideo() {
            const url = document.getElementById('youtubeUrl').value;
            const videoId = extractVideoId(url);
            if (!videoId) { alert('Please enter a valid YouTube link!'); return; }
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${videoId}`;
            document.getElementById('videoContainer').classList.remove('hidden');
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function extractClip() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const title = document.getElementById('clipTitle').value || 'My Clip';
            const speed = document.getElementById('clipSpeed').value;
            const format = document.getElementById('clipFormat').value;
            const color = document.getElementById('clipColor').value;
            if (!start || !end) { alert('Please enter start and end time!'); return; }
            alert(`✅ Clip "${title}" ready!\nFrom ${start}s to ${end}s\nSpeed: ${speed}x | Format: ${format} | Filter: ${color}`);
        }
    </script>

</body>
</html>
