<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eXtract Clip | eX Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; }
        .card { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 20px; }
        .card:hover { border-color: #FFD700; transition: all 0.4s; }
        .btn-gold { background: #FFD700; color: #000; font-weight: 600; border-radius: 10px; padding: 15px; width: 100%; transition: all 0.3s; cursor: pointer; letter-spacing: 2px; font-size: 13px; }
        .btn-gold:hover { background: #FFC200; }
        .input-style { background: #151515; border: 1px solid #222; color: white; border-radius: 10px; padding: 14px 16px; width: 100%; font-size: 13px; }
        .input-style:focus { outline: none; border-color: #FFD700; }
        .label { color: #FFD700; font-size: 10px; font-weight: 500; margin-bottom: 8px; display: block; letter-spacing: 3px; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 86px; font-weight: 300; color: #FFD700; letter-spacing: 6px; line-height: 1; }
    </style>
</head>
<body class="text-white p-6">

    <div class="max-w-xl mx-auto">

        <!-- Header -->
        <div class="text-center mb-12 mt-10">
            <div class="logo">eX</div>
            <p style="color:#FFD700; font-size:9px; letter-spacing:10px; margin-top:10px;">PRECISION CLIP EXTRACTION</p>
            <div style="width:30px; height:1px; background:#FFD700; margin:14px auto;"></div>
            <p style="color:#333; font-size:9px; letter-spacing:4px;">PROFESSIONAL VIDEO REPURPOSING TOOL</p>
        </div>

        <!-- Main Card -->
        <div class="card p-8">
            <p style="color:#444; font-size:11px; letter-spacing:2px; text-align:center; margin-bottom:24px;">PASTE YOUTUBE LINK BELOW</p>

            <div class="mb-5">
                <label class="label">YOUTUBE LINK</label>
                <input id="youtubeUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." class="input-style"/>
            </div>

            <button onclick="loadVideo()" class="btn-gold mb-6">▶ LOAD VIDEO</button>

            <div id="videoContainer" class="hidden">
                <div style="border:1px solid #222; border-radius:12px; overflow:hidden; margin-bottom:20px;">
                    <iframe id="youtubePlayer" class="w-full" height="260" frameborder="0" allowfullscreen></iframe>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="label">START TIME (seconds)</label>
                        <input type="number" id="startTime" placeholder="0" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">END TIME (seconds)</label>
                        <input type="number" id="endTime" placeholder="30" class="input-style"/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="label">CLIP TITLE</label>
                        <input type="text" id="clipTitle" placeholder="My Clip" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">SPEED</label>
                        <select id="clipSpeed" class="input-style">
                            <option value="1">Normal (1x)</option>
                            <option value="1.25">Fast (1.25x)</option>
                            <option value="1.5">Faster (1.5x)</option>
                            <option value="0.75">Slow (0.75x)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">FORMAT</label>
                        <select id="clipFormat" class="input-style">
                            <option>YouTube (16:9)</option>
                            <option>Reels/TikTok (9:16)</option>
                            <option>Instagram (1:1)</option>
