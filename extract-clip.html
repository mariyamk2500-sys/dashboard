<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eXtract Clip | eX Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .logo { font-family: 'Playfair Display', serif; font-size: 36px; font-style: italic; font-weight: 900; color: #FFD700; letter-spacing: -2px; line-height: 1; -webkit-text-stroke: 1px #FFA500; }
        .btn-gold { background: #FFD700; color: #000; font-weight: 700; border-radius: 8px; padding: 10px 20px; cursor: pointer; letter-spacing: 1px; font-size: 12px; border: none; white-space: nowrap; }
        .btn-gold:hover { background: #FFC200; }
        .btn-extract { background: #FFD700; color: #000; font-weight: 700; border-radius: 8px; padding: 12px; width: 100%; cursor: pointer; letter-spacing: 2px; font-size: 13px; border: none; }
        .btn-extract:hover { background: #FFC200; }
        .input-style { background: #151515; border: 1px solid #333; color: white; border-radius: 8px; padding: 10px 14px; width: 100%; font-size: 12px; }
        .input-style:focus { outline: none; border-color: #FFD700; }
        .label { color: #FFD700; font-size: 9px; font-weight: 700; margin-bottom: 4px; display: block; letter-spacing: 2px; }
        .card { background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 12px; padding: 14px; }
        .tl-track { position: relative; width: 100%; height: 8px; background: #2a2a2a; border-radius: 4px; margin: 10px 0 6px; }
        .tl-fill { position: absolute; height: 8px; background: #FFD700; border-radius: 4px; top: 0; pointer-events: none; }
        .tl-handle { position: absolute; width: 22px; height: 22px; background: #FFD700; border-radius: 50%; top: 50%; transform: translate(-50%, -50%); cursor: grab; border: 3px solid #0a0a0a; box-shadow: 0 0 10px rgba(255,215,0,0.6); z-index: 10; }
        .tl-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="text-white">

    <div style="padding:10px 20px; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; justify-content:space-between;">
        <div style="display:flex; align-items:center; gap:14px;">
            <div class="logo">eX</div>
            <div>
                <p style="color:#FFD700; font-size:11px; letter-spacing:5px; font-weight:700;">PRECISION CLIP EXTRACTION</p>
                <p style="color:#aaa; font-size:9px; letter-spacing:2px; margin-top:2px;">PROFESSIONAL VIDEO REPURPOSING TOOL</p>
            </div>
        </div>
        <p style="color:#444; font-size:8px; letter-spacing:2px;">eX EDITOR © 2026</p>
    </div>

    <div style="padding:10px 20px; border-bottom:1px solid #1a1a1a;">
        <div style="display:flex; gap:8px; align-items:center;">
            <input id="youtubeUrl" type="text" placeholder="Paste YouTube link here..." class="input-style"/>
            <button onclick="loadVideo()" class="btn-gold">▶ LOAD VIDEO</button>
        </div>
    </div>

    <div style="padding:14px 20px; display:flex; gap:14px; align-items:flex-start;">

        <div style="flex:1.4;">
            <div style="background:#000; border-radius:12px 12px 0 0; overflow:hidden; height:320px; position:relative;">
                <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px;">
                    <div style="font-size:40px;">🎬</div>
                    <p style="color:#333; font-size:11px; letter-spacing:2px;">PASTE LINK AND CLICK LOAD</p>
                </div>
                <div id="playerDiv" style="width:100%; height:100%; display:none;"></div>
            </div>

            <div style="background:#111; border:1px solid #222; border-top:2px solid #FFD700; border-radius:0 0 12px 12px; padding:12px 16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                    <p style="color:#FFD700; font-size:9px; letter-spacing:3px; font-weight:700;">✂ DRAG DOTS TO SELECT CLIP</p>
                    <span style="color:#555; font-size:9px;" id="totalDurLabel">Total: --</span>
                </div>
                <div class="tl-track" id="track">
                    <div class="tl-fill" id="fill"></div>
                    <div class="tl-handle" id="startHandle"></div>
                    <div class="tl-handle" id="endHandle"></div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="background:#FFD700; color:#000; font-size:11px; font-weight:700; padding:3px 10px; border-radius:5px;">▶ <span id="startDisplay">0:00</span></span>
                    <span style="color:#444; font-size:9px;">CLIP: <strong style="color:#FFD700;" id="durationDisplay">--</strong></span>
                    <span style="background:#FFD700; color:#000; font-size:11px; font-weight:700; padding:3px 10px; border-radius:5px;">■ <span id="endDisplay">--</span></span>
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-top:10px;">
                <div style="flex:1; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:8px; padding:8px; text-align:center;">
                    <span style="color:#FFD700; font-size:8px; letter-spacing:2px; display:block;">START</span>
                    <span style="color:#fff; font-size:15px; font-weight:700;" id="startInfo">0:00</span>
                </div>
                <div style="flex:1; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:8px; padding:8px; text-align:center;">
                    <span style="color:#FFD700; font-size:8px; letter-spacing:2px; display:block;">END</span>
                    <span style="color:#fff; font-size:15px; font-weight:700;" id="endInfo">--</span>
                </div>
                <div style="flex:1; background:#FFD700; border-radius:8px; padding:8px; text-align:center;">
                    <span style="color:#000; font-size:8px; letter-spacing:2px; display:block; font-weight:700;">DURATION</span>
                    <span style="color:#000; font-size:15px; font-weight:700;" id="durInfo">--</span>
                </div>
            </div>
        </div>

        <div style="width:260px; display:flex; flex-direction:column; gap:10px;">
            <div class="card">
                <label class="label" style="font-size:10px; margin-bottom:12px;">⚙ CLIP SETTINGS</label>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div>
                        <label class="label">CLIP TITLE</label>
                        <input type="text" id="clipTitle" placeholder="My Clip" class="input-style"/>
                    </div>
                    <div>
                        <label class="label">SPEED</label>
                        <select id="clipSpeed" class="input-style">
                            <option value="1">Normal (1x)</option>
                            <option value="1.25">Fast (1.25x)</option>
                            <option value="1.5">Faster (1.5x)</option>
                            <option value="0.75">Slow (0.75x)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">FORMAT</label>
                        <select id="clipFormat" class="input-style">
                            <option>YouTube (16:9)</option>
                            <option>Reels/TikTok (9:16)</option>
                            <option>Instagram (1:1)</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">COLOR FILTER</label>
                        <select id="clipColor" class="input-style">
                            <option>None</option>
                            <option>Vibrant</option>
                            <option>Cinematic</option>
                            <option>Warm</option>
                            <option>Cool</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">TEXT OVERLAY</label>
                        <input type="text" id="videoTitle" placeholder="Add text on clip..." class="input-style"/>
                    </div>
                </div>
            </div>
            <button onclick="extractClip()" class="btn-extract">✂ EXTRACT CLIP</button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let videoDuration = 0;
        let startTime = 0;
        let endTime = 0;
        let player;
        let videoId = '';

        function loadVideo() {
            const url = document.getElementById('youtubeUrl').value;
            videoId = extractVideoId(url);
            if (!videoId) { alert('Please enter a valid YouTube link!'); return; }
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('playerDiv').style.display = 'block';
            if (player) {
                player.loadVideoById(videoId);
            } else {
                player = new YT.Player('playerDiv', {
                    width: '100%',
                    height: '100%',
                    videoId: videoId,
                    playerVars: { rel: 0, modestbranding: 1 },
                    events: {
                        onReady: onPlayerReady,
                        onStateChange: onStateChange
                    }
                });
            }
        }

        function onPlayerReady(event) {
            setTimeout(() => {
                videoDuration = player.getDuration();
                if (videoDuration > 0) {
                    startTime = 0;
                    endTime = Math.min(60, videoDuration);
                    document.getElementById('totalDurLabel').textContent = 'Total: ' + formatTime(videoDuration);
                    updateSlider();
                }
            }, 1500);
        }

        function onStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING && videoDuration === 0) {
                videoDuration = player.getDuration();
                startTime = 0;
                endTime = Math.min(60, videoDuration);
                document.getElementById('totalDurLabel').textContent = 'Total: ' + formatTime(videoDuration);
                updateSlider();
            }
        }

        function extractVideoId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function updateSlider() {
            if (videoDuration === 0) return;
            const track = document.getElementById('track');
            const trackW = track.offsetWidth;
            const startX = (startTime / videoDuration) * trackW;
            const endX = (endTime / videoDuration) * trackW;
            document.getElementById('startHandle').style.left = startX + 'px';
            document.getElementById('endHandle').style.left = endX + 'px';
            document.getElementById('fill').style.left = startX + 'px';
            document.getElementById('fill').style.width = (endX - startX) + 'px';
            document.getElementById('startDisplay').textContent = formatTime(startTime);
            document.getElementById('endDisplay').textContent = formatTime(endTime);
            document.getElementById('startInfo').textContent = formatTime(startTime);
            document.getElementById('endInfo').textContent = formatTime(endTime);
            document.getElementById('durationDisplay').textContent = formatTime(endTime - startTime);
            document.getElementById('durInfo').textContent = formatTime(endTime - startTime);
        }

        function setupDrag(handleId, type) {
            const handle = document.getElementById(handleId);
            const onMove = (clientX) => {
                if (videoDuration === 0) return;
                const track = document.getElementById('track');
                const rect = track.getBoundingClientRect();
                let x = clientX - rect.left;
                x = Math.max(0, Math.min(x, track.offsetWidth));
                const time = Math.round((x / track.offsetWidth) * videoDuration);
                if (type === 'start' && time < endTime - 5) startTime = time;
                if (type === 'end' && time > startTime + 5) endTime = time;
                updateSlider();
            };
            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const move = (e) => onMove(e.clientX);
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move), {once:true});
            });
            handle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const move = (e) => onMove(e.touches[0].clientX);
                document.addEventListener('touchmove', move, {passive:false});
                document.addEventListener('touchend', () => document.removeEventListener('touchmove', move), {once:true});
            });
        }

        setupDrag('startHandle', 'start');
        setupDrag('endHandle', 'end');

        function extractClip() {
            if (videoDuration === 0) { alert('Please load a video first!'); return; }
            const title = document.getElementById('clipTitle').value || 'My Clip';
            const speed = document.getElementById('clipSpeed').value;
            const format = document.getElementById('clipFormat').value;
            const color = document.getElementById('clipColor').value;
            alert(`✅ Clip "${title}" ready!\nFrom ${formatTime(startTime)} to ${formatTime(endTime)}\nDuration: ${formatTime(endTime-startTime)}\nSpeed: ${speed}x | Format: ${format} | Filter: ${color}`);
        }
    </script>

</body>
</html>
