<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Center | Workflow Hub</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --gold: #F4C300;
            --text: #ffffff;
            --panel: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--panel);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: var(--gold); font-size: 24px; margin-bottom: 20px; }
        .status { margin: 20px 0; padding: 10px; border: 1px dashed var(--gold); }
        button {
            background-color: var(--gold);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background-color: #d4a700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>COMMAND CENTER</h1>
        <div id="url-display" class="status">Waiting for link...</div>
        <button onclick="processLink()">PROCESS DATA</button>
    </div>

    <script>
        // Yeh function URL ko catch karega
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        
        if (videoUrl) {
            document.getElementById('url-display').innerText = "Received: " + videoUrl;
        }

        function processLink() {
            alert("Workflow triggered for: " + (videoUrl || "No URL found"));
            // Yahan baad mein n8n ka URL aayega
        }
    </script>
</body>
</html>
